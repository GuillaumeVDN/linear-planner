name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build Docker image
        run: docker build --build-arg VITE_LINEAR_CLIENT_ID=${{ vars.VITE_LINEAR_CLIENT_ID }} -t linear-planner .

      - name: Stop existing container
        run: docker rm -f linear-planner || true

      - name: Start container
        run: docker run -d --name linear-planner --restart unless-stopped -p 29548:80 linear-planner
