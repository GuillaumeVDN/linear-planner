name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t linear-planner .

      - name: Stop existing container
        run: docker rm -f linear-planner || true

      - name: Start container
        run: docker run -d --name linear-planner --restart unless-stopped -p 3100:80 linear-planner
